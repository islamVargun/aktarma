<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ Neon Yarış - Aktarma Pro Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a1a;color:#e0e0e0;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(244,114,182,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(244,114,182,.03) 1px,transparent 1px);background-size:30px 30px;z-index:0}
        .gw{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px}
        .gt{font-family:'Press Start 2P',cursive;font-size:20px;color:#f472b6;margin-bottom:4px}
        .gs{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
        .sb{display:flex;gap:18px}
        .si{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 18px;text-align:center;min-width:100px}
        .sl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.35);margin-bottom:3px}
        .sv{font-family:'Press Start 2P',cursive;font-size:16px;color:#f472b6}
        .sv.h{color:#facc15}
        .sv.lives{color:#f87171}
        .cw{position:relative;border-radius:14px;overflow:hidden;box-shadow:0 0 30px rgba(244,114,182,.12);border:2px solid rgba(244,114,182,.2)}
        canvas{display:block;background:#0d1117}
        .ov{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,10,26,.88);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;transition:opacity .3s}
        .ov.hidden{opacity:0;pointer-events:none}
        .ot{font-family:'Press Start 2P',cursive;font-size:18px;color:#f472b6}
        .ot.dead{color:#f87171}
        .os{font-family:'Press Start 2P',cursive;font-size:11px;color:#facc15}
        .pb{font-family:'Press Start 2P',cursive;font-size:10px;padding:12px 26px;border:2px solid #f472b6;background:rgba(244,114,182,.1);color:#f472b6;border-radius:10px;cursor:pointer;transition:all .2s}
        .pb:hover{background:rgba(244,114,182,.25);transform:scale(1.05);box-shadow:0 0 18px rgba(244,114,182,.3)}
        .hint{font-size:11px;color:rgba(255,255,255,.3)}
        .bl{position:fixed;top:16px;left:16px;z-index:100;text-decoration:none;color:rgba(255,255,255,.3);font-size:13px;transition:color .2s}
        .bl:hover{color:rgba(255,255,255,.7)}
    </style>
</head>
<body>
<a href="/games" class="bl">← Oyun Salonu</a>
<div class="gw">
    <div style="text-align:center"><div class="gt">🏎️ NEON YARIŞ</div><div class="gs">Aktarma Pro Arcade</div></div>
    <div class="sb">
        <div class="si"><div class="sl">Skor</div><div class="sv" id="score">0</div></div>
        <div class="si"><div class="sl">Can</div><div class="sv lives" id="lives">❤❤❤</div></div>
        <div class="si"><div class="sl">En Yüksek</div><div class="sv h" id="highScore">0</div></div>
    </div>
    <div class="cw">
        <canvas id="c" width="360" height="600"></canvas>
        <div class="ov" id="startOv">
            <div class="ot">🏎️ NEON YARIŞ</div>
            <button class="pb" id="startBtn">OYNA</button>
            <div class="hint">← → veya A/D ile hareket et</div>
        </div>
        <div class="ov hidden" id="overOv">
            <div class="ot dead">KAZA!</div>
            <div class="os" id="finalScore">Skor: 0</div>
            <button class="pb" id="restartBtn">TEKRAR OYNA</button>
        </div>
    </div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const W=360,H=600;
const ROAD_L=60,ROAD_R=300,ROAD_W=ROAD_R-ROAD_L;
const LANES=[ROAD_L+ROAD_W/6,ROAD_L+ROAD_W/2,ROAD_L+5*ROAD_W/6];
const CAR_W=36,CAR_H=60;

let player,enemies,coins,particles,score,highScore,lives,speed,frame,running,moveDir;
highScore=parseInt(localStorage.getItem('carHighScore')||'0');
document.getElementById('highScore').textContent=highScore;

function init(){
    player={x:W/2,y:H-100,lane:1};
    player.x=LANES[1];
    enemies=[];coins=[];particles=[];
    score=0;lives=3;speed=3;frame=0;moveDir=0;
    document.getElementById('score').textContent='0';
    document.getElementById('lives').textContent='❤❤❤';
}

function spawnEnemy(){
    let lane=Math.floor(Math.random()*3);
    enemies.push({x:LANES[lane],y:-70,lane:lane,color:['#f87171','#60a5fa','#facc15','#a78bfa'][Math.floor(Math.random()*4)]});
}

function spawnCoin(){
    let lane=Math.floor(Math.random()*3);
    coins.push({x:LANES[lane],y:-30});
}

function update(){
    frame++;
    // Player movement
    if(moveDir!==0){
        player.x+=moveDir*5;
        player.x=Math.max(ROAD_L+CAR_W/2+4,Math.min(ROAD_R-CAR_W/2-4,player.x));
    }
    // Spawn
    if(frame%Math.max(25,60-Math.floor(score/20))===0)spawnEnemy();
    if(frame%120===0)spawnCoin();
    // Enemies
    for(let i=enemies.length-1;i>=0;i--){
        enemies[i].y+=speed+1;
        if(enemies[i].y>H+80){enemies.splice(i,1);continue;}
        // Collision
        let e=enemies[i];
        if(Math.abs(e.x-player.x)<CAR_W-4&&Math.abs(e.y-player.y)<CAR_H-4){
            lives--;
            document.getElementById('lives').textContent='❤'.repeat(Math.max(0,lives));
            // Explosion
            for(let j=0;j<12;j++){
                particles.push({x:e.x,y:e.y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:20,color:e.color,size:3+Math.random()*4});
            }
            enemies.splice(i,1);
            if(lives<=0){die();return;}
            cv.style.transform='translateX(3px)';
            setTimeout(()=>cv.style.transform='translateX(-3px)',40);
            setTimeout(()=>cv.style.transform='',80);
        }
    }
    // Coins
    for(let i=coins.length-1;i>=0;i--){
        coins[i].y+=speed;
        if(coins[i].y>H+30){coins.splice(i,1);continue;}
        if(Math.abs(coins[i].x-player.x)<24&&Math.abs(coins[i].y-player.y)<24){
            score+=50;
            for(let j=0;j<6;j++){
                particles.push({x:coins[i].x,y:coins[i].y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:15,color:'#facc15',size:3});
            }
            coins.splice(i,1);
        }
    }
    // Particles
    for(let i=particles.length-1;i>=0;i--){
        let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
        if(p.life<=0)particles.splice(i,1);
    }
    // Score
    if(frame%4===0){score++;
        if(score>highScore){highScore=score;localStorage.setItem('carHighScore',highScore);document.getElementById('highScore').textContent=highScore;}
    }
    document.getElementById('score').textContent=score;
    speed=3+score*0.005;
}

function drawCar(x,y,w,h,color,isPlayer){
    cx.save();
    if(isPlayer){cx.shadowColor='#f472b6';cx.shadowBlur=12;}
    else{cx.shadowColor=color;cx.shadowBlur=6;}
    // Body
    cx.fillStyle=color;
    cx.beginPath();
    cx.roundRect(x-w/2,y-h/2,w,h,6);
    cx.fill();
    // Windshield
    cx.fillStyle='rgba(0,0,0,0.4)';
    if(isPlayer){cx.fillRect(x-w/2+5,y-h/2+6,w-10,12);}
    else{cx.fillRect(x-w/2+5,y+h/2-18,w-10,12);}
    // Headlights
    cx.fillStyle=isPlayer?'#fff':'#facc15';
    if(isPlayer){
        cx.fillRect(x-w/2+3,y-h/2-2,6,4);cx.fillRect(x+w/2-9,y-h/2-2,6,4);
    }else{
        cx.fillRect(x-w/2+3,y+h/2-2,6,4);cx.fillRect(x+w/2-9,y+h/2-2,6,4);
    }
    cx.restore();
}

function draw(){
    cx.fillStyle='#0d1117';cx.fillRect(0,0,W,H);
    // Road
    cx.fillStyle='#151520';cx.fillRect(ROAD_L,0,ROAD_W,H);
    // Barriers
    cx.save();cx.shadowColor='#f472b6';cx.shadowBlur=8;
    cx.fillStyle='#f472b6';cx.fillRect(ROAD_L-3,0,3,H);cx.fillRect(ROAD_R,0,3,H);
    cx.restore();
    // Lane lines
    cx.strokeStyle='rgba(255,255,255,0.08)';cx.lineWidth=2;cx.setLineDash([20,20]);
    let dashOff=-(frame*speed*2)%40;
    cx.lineDashOffset=dashOff;
    cx.beginPath();cx.moveTo(ROAD_L+ROAD_W/3,0);cx.lineTo(ROAD_L+ROAD_W/3,H);cx.stroke();
    cx.beginPath();cx.moveTo(ROAD_L+2*ROAD_W/3,0);cx.lineTo(ROAD_L+2*ROAD_W/3,H);cx.stroke();
    cx.setLineDash([]);
    // Speed lines
    if(speed>5){
        cx.globalAlpha=(speed-5)*0.02;
        cx.strokeStyle='rgba(244,114,182,0.3)';cx.lineWidth=1;
        for(let i=0;i<6;i++){
            let lx=ROAD_L+10+Math.random()*ROAD_W-20;
            let ly=Math.random()*H;
            cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx,ly+30+speed*3);cx.stroke();
        }
        cx.globalAlpha=1;
    }
    // Coins
    for(let c of coins){
        cx.save();cx.shadowColor='#facc15';cx.shadowBlur=10;
        cx.fillStyle='#facc15';
        cx.beginPath();cx.arc(c.x,c.y,8,0,Math.PI*2);cx.fill();
        cx.fillStyle='#0d1117';cx.font='bold 10px Inter';cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText('$',c.x,c.y+1);
        cx.restore();
    }
    // Enemies
    for(let e of enemies)drawCar(e.x,e.y,CAR_W-4,CAR_H-8,e.color,false);
    // Player
    drawCar(player.x,player.y,CAR_W,CAR_H,'#f472b6',true);
    // Particles
    for(let p of particles){
        cx.globalAlpha=p.life/20;
        cx.fillStyle=p.color;
        cx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
    cx.globalAlpha=1;
}

function die(){
    running=false;
    document.getElementById('finalScore').textContent='Skor: '+score;
    document.getElementById('overOv').classList.remove('hidden');
}

function loop(){if(!running)return;update();draw();requestAnimationFrame(loop);}
function start(){init();document.getElementById('startOv').classList.add('hidden');document.getElementById('overOv').classList.add('hidden');running=true;loop();}

document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('restartBtn').addEventListener('click',start);

document.addEventListener('keydown',e=>{
    if(!running)return;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')moveDir=-1;
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')moveDir=1;
    e.preventDefault();
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){if(moveDir===-1)moveDir=0;}
    if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){if(moveDir===1)moveDir=0;}
});
// Touch
let tx=0;
cv.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
cv.addEventListener('touchmove',e=>{
    if(!running)return;
    let dx=e.touches[0].clientX-tx;
    if(Math.abs(dx)>5){moveDir=dx>0?1:-1;tx=e.touches[0].clientX;}
},{passive:true});
cv.addEventListener('touchend',()=>{moveDir=0;},{passive:true});
</script>
</body>
</html>
